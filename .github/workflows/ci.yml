name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./ci.db"
      AUTH_SECRET: "ci-only-secret-not-for-production"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - run: npx prisma generate

      - run: npx tsc --noEmit

      - run: npm run lint

      - run: npm run build
